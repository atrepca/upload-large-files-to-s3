<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Încărcare Fișier în S3</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="#">
    <script src="https://unpkg.com/vue@2.6.14/dist/vue.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="lang/ro.js"></script><!-- Load language file - change to en.js for English -->
</head>
<body>
    <div id="app">
        <h1>{{ t.appTitle }}</h1>
        <div v-if="!file">
            <h2>{{ t.selectFile }}</h2>
            <!-- Custom file selection button -->
            <div class="custom-file-upload">
                <input type="file" id="file-input" @change="onFileChange" style="display: none;">
                <button @click="triggerFileInput" class="file-input-button">{{ t.browseButton }}</button>
                <span v-if="!file">{{ t.noFileChosen }}</span>
            </div>
        </div>
        <div v-else>
            <p>{{ t.selectedFile }}: {{ file.name }}</p>
            <p>{{ t.size }}: {{ formatBytes(file.size) }}</p>
            <div>
                <button v-if="!uploadURL && !isUploading" @click="removeFile">{{ t.resetButton }}</button>
                <button v-if="!uploadURL && !isUploading" @click="uploadFile">{{ t.uploadButton }}</button>
            </div>
        </div>
        <!-- Progress bar for upload -->
        <div v-if="isUploading" class="progress-container">
            <div class="progress-bar" :style="{ width: uploadProgress + '%' }"></div>
            <div class="progress-text">{{ uploadProgress }}% {{ t.uploaded }}</div>
            <p class="progress-details" v-if="currentPart">{{ t.uploadedPart }} {{ currentPart }} {{ t.uploadedPartOf }} {{ totalParts }}</p>
        </div>
        <h2 v-if="uploadURL">{{ t.success }}</h2>
        <p v-if="uploadURL"><a :href="uploadURL" target="_blank">{{ t.viewFile }}</a></p>
    </div>

    <script>
        const API_URL = 'https://<random>.lambda-url.<region>.on.aws' // Update with your Lambda function URL
        const UPLOAD_CONCURRENCY_LIMIT = 3; // Maximum simultaneous chunk uploads for mobile/cellular optimization

        // Check if external dependencies are available
        if (typeof Vue === 'undefined' || typeof axios === 'undefined') {
            document.getElementById('app').innerHTML = `
                <h1>Loading Dependencies...</h1>
                <p>External libraries (Vue.js, Axios) are not available. Please check your internet connection or serve from a proper web server.</p>
                <p>This demo requires Vue.js and Axios to function properly.</p>
            `;
        } else {
            // Flag to track if upload module is loaded
            let uploadModuleLoaded = false;

            // Function to lazy load upload module
            async function loadUploadModule() {
                if (uploadModuleLoaded) return;
                
                return new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = './upload.js';
                    script.onload = () => {
                        uploadModuleLoaded = true;
                        console.log("Upload module loaded successfully");
                        resolve();
                    };
                    script.onerror = reject;
                    document.head.appendChild(script);
                });
            }

            new Vue({
                el: "#app",
                data: {
                    file: null,
                    uploadURL: '',
                    isUploading: false,
                    uploadProgress: 0,
                    currentPart: 0,
                    totalParts: 0,
                    uploadManager: null, // Will be lazy-loaded
                    t: translations // Import from language file
                },
                methods: {
                    // Trigger the hidden file input
                    triggerFileInput() {
                        document.getElementById('file-input').click();
                    },
                    formatBytes(bytes, decimals = 2) {
                        if (bytes === 0) return '0 Bytes';
                        const k = 1024;
                        const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
                        const i = Math.floor(Math.log(bytes) / Math.log(k));
                        return parseFloat((bytes / Math.pow(k, i)).toFixed(decimals)) + ' ' + sizes[i];
                    },
                    onFileChange(e) {
                        const files = e.target.files;
                        if (!files.length) return;
                        this.file = files[0];
                    },
                    removeFile() {
                        this.file = null;
                        this.uploadURL = '';
                        this.uploadProgress = 0;
                        this.currentPart = 0;
                        this.totalParts = 0;
                    },
                    async uploadFile() {
                        if (!this.file) return alert(this.t.noFileSelected);

                        try {
                            this.isUploading = true;
                            this.uploadProgress = 0;

                            // Lazy load upload module only when needed
                            if (!this.uploadManager) {
                                console.log("Loading upload module...");
                                await loadUploadModule();
                                
                                // Check if upload module loaded successfully
                                if (typeof window.S3Upload === 'undefined') {
                                    throw new Error('Upload module failed to load');
                                }
                                
                                this.uploadManager = window.S3Upload.initializeUpload(API_URL, UPLOAD_CONCURRENCY_LIMIT);
                                console.log("Upload manager initialized with concurrency limit:", UPLOAD_CONCURRENCY_LIMIT);
                            }

                            // Calculate total parts for progress display
                            const CHUNK_SIZE = 5 * 1024 * 1024; // 5MB
                            this.totalParts = Math.ceil(this.file.size / CHUNK_SIZE);

                            // Upload file with progress callbacks
                            const uploadURL = await this.uploadManager.uploadFile(this.file, {
                                onProgress: (progress) => {
                                    this.uploadProgress = progress;
                                },
                                onPartProgress: (partNumber) => {
                                    this.currentPart = partNumber;
                                },
                                onError: (error) => {
                                    console.error("Upload error:", error);
                                    alert(`${this.t.uploadFailed}: ${error.message}`);
                                }
                            });

                            this.uploadURL = uploadURL;
                            this.isUploading = false;

                        } catch (error) {
                            console.error("Upload failed:", error);
                            alert(`${this.t.uploadFailed}: ${error.message}`);
                            this.isUploading = false;
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
